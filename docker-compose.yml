services:
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    expose:
      - "3001"
    volumes:
      - ./data:/app/data:ro
      - mcp-db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chat-backend:
    build:
      context: .
      dockerfile: chat-server/Dockerfile
    expose:
      - "3002"
    env_file:
      - .env
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chat-frontend:
    build: ./chat-frontend
    ports:
      - "3000:80"
    depends_on:
      chat-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mcp-db:
